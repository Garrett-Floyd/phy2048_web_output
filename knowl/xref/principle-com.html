<span class="type">Principle</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">17.5.1</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h3>
<div class="para logical">
<div class="para">For a system of particles the com is defined as the vector:</div>
<div class="displaymath process-math">
\begin{equation*}
\vec{r}_{com} = \frac{\sum_i m_i \vec{r}_i}{M}
\end{equation*}
</div>
<div class="para">where</div>
<div class="displaymath process-math">
\begin{equation*}
M = {\sum_i m_i}
\end{equation*}
</div>
<div class="para">and the index <span class="process-math">\(i\)</span> ranges over all particles in the system.</div>
