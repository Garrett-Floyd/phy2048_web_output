<figcaption><span class="type">Figure</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">12.4.1<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>The diagram shows a two pulley, three rope mechanical system used to hold a mass labeled <span class="process-math">\(m\)</span> without moving. A fixed support is positioned at the top, holding the upper rope. The upper rope connects to the upper pully via a hook on the top of the pulley. The tension in the upper rope is labeled <span class="process-math">\(T_4\text{.}\)</span> The middle rope runs over the upper pulley from the right. The tension in this segment of the middle rope is labeled <span class="process-math">\(T_5\text{.}\)</span> A force labeled <span class="process-math">\(F\)</span> is applyed to the bottom of this segment of the middle rope. After looping over the upper pulley, the middle rope runs vertically down and loops under the lower pulley. The tension in this segment of the middle rope is labeled <span class="process-math">\(T_2\text{.}\)</span> After looping under the lower pulley, the middle rope runs vertically up and connects to the upper pully via a hook on the bottom of the pulley. The tension in this segment of the middle rope is labeled <span class="process-math">\(T_3\text{.}\)</span> The lower rope is fastened to the lower pulley via a hook on the bottom of the pulley, and runs vertically down where it is fastened to the hanging mass labeled <span class="process-math">\(m\text{.}\)</span> The tension in the lower rope is labeled <span class="process-math">\(T_4\text{.}\)</span><div class="autopermalink" data-description="Figure 12.4.1"><a href="#fig-pulleys-3" title="Copy heading and permalink for Figure 12.4.1" aria-label="Copy heading and permalink for Figure 12.4.1">🔗</a></div></figcaption></figure><span class="incontext
