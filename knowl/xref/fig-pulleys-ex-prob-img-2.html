<figcaption><span class="type">Figure</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">12.3.2<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>A simple two mass pulley system suspended from a horizontal beam supported by a vertical frame. A single pulley hangs from the center of the beam via a string. A rope runs over the pulley with one mass on each end. On the left side, an elephant icon represents mass <span class="process-math">\(m_{1}\text{.}\)</span> The distance from the center of the pulley to the center of mass <span class="process-math">\(m_{1}\)</span> is <span class="process-math">\(y_{1}\text{.}\)</span> The distance from the center of mass <span class="process-math">\(m_{1}\)</span> to the end of the string is <span class="process-math">\(c_{1}\)</span> On the right side, a T-shirt icon represents mass <span class="process-math">\(m_{2}\text{.}\)</span> The distance from the center of the pulley to the center of mass <span class="process-math">\(m_{2}\)</span> is <span class="process-math">\(y_{2}\text{.}\)</span> The distance from the center of mass <span class="process-math">\(m_{2}\)</span> to the end of the string is <span class="process-math">\(c_{2}\)</span> Both masses hang freely, aligned vertically beneath the pulley.<div class="autopermalink" data-description="Figure 12.3.2"><a href="#fig-pulleys-ex-prob-img-2" title="Copy heading and permalink for Figure 12.3.2" aria-label="Copy heading and permalink for Figure 12.3.2">🔗</a></div></figcaption></figure><span class="incontext"><a class="internal" href="sec-pulleys-ex-prob-2.html#fig-pulleys-ex-prob-img-2">in-context</a></span>
